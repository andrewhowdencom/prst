version: "3"

tasks:
  setup:
    desc: Install required tools and dependencies
    cmds:
      - go mod download
      - go install github.com/google/wire/cmd/wire@latest
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

  generate:
    desc: Generate code (Wire, etc.)
    cmds:
      - go generate ./...
      - wire ./internal/di

  build:
    desc: Compile the prst binary
    cmds:
      - go build -o ./prst ./cmd/prst

  test:
    desc: Run unit tests with race detector
    cmds:
      - go test -race ./...

  lint:
    desc: Run code linters
    cmds:
      - golangci-lint run

  validate:
    desc: Run lints, tests, and build before committing
    deps: [lint, test, build]
